<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: radial-gradient(1200px 800px at 15% -10%, #1b3a5c 0%, #0b0b0f 55%),
                #0b0b0f;
    color: #f5f5f7;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 90px; position: relative;
  }
  .mark { display: flex; align-items: center; gap: 16px; margin-bottom: 38px; }
  .dot {
    width: 56px; height: 56px; border-radius: 15px;
    background: linear-gradient(135deg, #0a84ff, #bf5af2);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 32px; font-weight: 700;
  }
  .brand { font-size: 34px; font-weight: 600; letter-spacing: -0.01em; }
  h1 {
    font-size: 76px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.06;
    background: linear-gradient(90deg, #f5f5f7 35%, #6ab7ff 75%, #cf8fff 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    max-width: 950px;
  }
  .sub { font-size: 30px; color: #a1a1a6; margin-top: 28px; }
  .url { position: absolute; bottom: 44px; left: 90px; font-size: 24px; color: #6e6e73; font-weight: 500; }
  .emojis { position: absolute; bottom: 38px; right: 90px; font-size: 40px; letter-spacing: 14px; }
</style>
</head>
<body>
  <div class="mark"><div class="dot">A</div><div class="brand">AI Speeds</div></div>
  <h1>Free web apps, built at AI speed.</h1>
  <div class="sub">Language learning · Poker training · Games · Diving</div>
  <div class="url">ai-speeds.com</div>
  <div class="emojis">⛩️🐼🕊️♠️🐙🐠🤿</div>
</body>
</html>
